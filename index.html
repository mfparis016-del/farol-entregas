
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farol de Entregas — Grupo MF Paris</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a202c;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.header-left{display:flex;align-items:center;gap:16px}
.logo-img{height:48px;width:auto}
.divider{width:1px;height:36px;background:#e2e8f0}
.header-title{font-size:15px;font-weight:600;color:#1a202c}
.header-sub{font-size:11px;color:#718096;margin-top:2px}
.header-date{font-size:12px;color:#718096;background:#f7fafc;border:1px solid #e2e8f0;padding:6px 14px;border-radius:20px}
main{max-width:1500px;margin:0 auto;padding:2rem 1.5rem}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.75rem}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.2rem 1.4rem;cursor:pointer;transition:all .18s ease}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-2px)}
.kpi-rota.active{background:#eff6ff;border-color:#bfdbfe}
.kpi-ag.active{background:#fffbeb;border-color:#fde68a}
.kpi-ent.active{background:#ecfdf5;border-color:#a7f3d0}
.kpi-prob.active{background:#fef2f2;border-color:#fecaca}
.kpi-icon{font-size:22px;margin-bottom:10px;display:block}
.kpi-num{font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.kpi-rota .kpi-num{color:#2563eb}
.kpi-ag .kpi-num{color:#d97706}
.kpi-ent .kpi-num{color:#059669}
.kpi-prob .kpi-num{color:#dc2626}
.kpi-label{font-size:12px;color:#718096}
.toolbar{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:220px}
.search-wrap input{width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;color:#1a202c;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s}
.search-wrap input::placeholder{color:#a0aec0}
.search-wrap input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.btn-f{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:500;color:#718096;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.btn-f:hover{color:#1a202c;border-color:#cbd5e0;background:#f7fafc}
.btn-f.a-todos{color:#1a202c;border-color:#cbd5e0;background:#f7fafc;font-weight:600}
.btn-f.a-rota{background:#eff6ff;border-color:#93c5fd;color:#2563eb;font-weight:600}
.btn-f.a-ag{background:#fffbeb;border-color:#fcd34d;color:#d97706;font-weight:600}
.btn-f.a-ent{background:#ecfdf5;border-color:#6ee7b7;color:#059669;font-weight:600}
.btn-f.a-prob{background:#fef2f2;border-color:#fca5a5;color:#dc2626;font-weight:600}
.count-bar{font-size:12px;color:#a0aec0;margin-bottom:.6rem}
.tbl-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;overflow-x:auto;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
thead tr{background:#f8fafc;border-bottom:1px solid #e2e8f0}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{color:#64748b;background:#f1f5f9}
th.sort-asc::after{content:' ↑';color:#3b82f6}
th.sort-desc::after{content:' ↓';color:#3b82f6}
th.sort-asc,th.sort-desc{color:#3b82f6}
td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#1a202c}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-rota{background:#dbeafe;color:#1d4ed8}
.badge-aguardando{background:#fef3c7;color:#92400e}
.badge-entregue{background:#d1fae5;color:#065f46}
.badge-problema{background:#fee2e2;color:#991b1b}
.licit-tag{font-size:11px;background:#f0f4ff;color:#4f46e5;padding:3px 9px;border-radius:6px;white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis;display:inline-block;font-weight:500}
.cliente-cell{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#374151;font-weight:500}
.dim{color:#cbd5e0}
.prob-text{color:#dc2626;font-size:11px;font-weight:500}
.warn-text{color:#d97706;font-size:11px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
@media(max-width:768px){main{padding:1rem}header{padding:.8rem 1rem}.header-date{display:none}.logo-img{height:38px}}
</style>
</head>

let cur='todos', srch='', sortCol='prev_fat', sortDir=1;

function dateVal(s){
  const d=parseDate(s);
  return d?d.getTime():(s&&s!=='-'?999999999999:9999999999999);
}
function strVal(s){return(s||'').toLowerCase();}

function sortData(arr){
  return [...arr].sort((a,b)=>{
    let va,vb;
    if(['prev_fat','embarque','previsao'].includes(sortCol)){
      va=dateVal(a[sortCol]); vb=dateVal(b[sortCol]);
    } else if(sortCol==='status'){
      va=STATUS_ORDER[a.status]??9; vb=STATUS_ORDER[b.status]??9;
    } else if(sortCol==='pedido'){
      va=parseInt(a.pedido)||0; vb=parseInt(b.pedido)||0;
    } else {
      va=strVal(a[sortCol]); vb=strVal(b[sortCol]);
    }
    if(va<vb)return -1*sortDir;
    if(va>vb)return 1*sortDir;
    return 0;
  });
}

function sortBy(col){
  if(sortCol===col){sortDir*=-1;}else{sortCol=col;sortDir=1;}
  document.querySelectorAll('th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
  });
  const ths=document.querySelectorAll('th.sortable');
  const cols=['prev_fat','pedido','cliente','cidade','estado','licitacao','embarque','previsao','status'];
  const idx=cols.indexOf(col);
  if(idx>=0){
    ths[idx].classList.add(sortDir===1?'sort-asc':'sort-desc');
  }
  render();
}

function fmtEmb(s){
  if(!s||s==='-')return'<span class="dim">—</span>';
  if(s.toUpperCase().includes('DIFICULDADE'))return'<span class="prob-text">⚠️ Dific. transportadora</span>';
  if(s.toUpperCase().includes('AGUARDANDO'))return'<span class="warn-text">⏳ '+s+'</span>';
  return s;
}
function fmtLicit(s){if(!s||s==='-')return'<span class="dim">—</span>';return'<span class="licit-tag" title="'+s+'">'+s+'</span>';}
function fmtDate(s){if(!s||s==='-')return'<span class="dim">—</span>';return s;}

function render(){
  const q=srch.toLowerCase();
  let rows=DATA.filter(r=>{
    if(cur!=='todos'&&r.status!==cur)return false;
    if(q&&![r.cliente,r.cidade,r.estado,r.pedido,r.licitacao].some(v=>v.toLowerCase().includes(q)))return false;
    return true;
  });
  rows=sortData(rows);
  const cnt={rota:0,aguardando:0,entregue:0,problema:0};
  DATA.forEach(r=>cnt[r.status]++);
  document.getElementById('n-rota').textContent=cnt.rota;
  document.getElementById('n-ag').textContent=cnt.aguardando;
  document.getElementById('n-ent').textContent=cnt.entregue;
  document.getElementById('n-prob').textContent=cnt.problema;
  document.getElementById('count-bar').textContent='Exibindo '+rows.length+' de '+DATA.length+' pedidos';
  document.getElementById('tbody').innerHTML=rows.map(r=>
    '<tr>'+
    '<td style="font-size:12px;color:#64748b">'+fmtDate(r.prev_fat)+'</td>'+
    '<td style="font-size:12px;font-weight:600;color:#475569">'+r.pedido+'</td>'+
    '<td class="cliente-cell" title="'+r.cliente+'">'+r.cliente+'</td>'+
    '<td style="color:#4a5568;font-size:13px">'+r.cidade+'</td>'+
    '<td style="font-size:11px;font-weight:600;color:#94a3b8">'+r.estado+'</td>'+
    '<td style="font-size:12px;color:#64748b">'+r.peso+'</td>'+
    '<td>'+fmtLicit(r.licitacao)+'</td>'+
    '<td style="font-size:12px;color:#4a5568">'+fmtEmb(r.embarque)+'</td>'+
    '<td style="font-size:12px;color:#4a5568">'+fmtDate(r.previsao)+'</td>'+
    '<td><span class="badge badge-'+r.status+'">'+LABEL[r.status]+'</span></td>'+
    '</tr>'
  ).join('');
}
function setFilter(f){
  cur=f;
  document.querySelectorAll('.btn-f').forEach(b=>b.className='btn-f');
  const map={todos:'btn-todos',rota:'btn-rota',aguardando:'btn-ag',entregue:'btn-ent',problema:'btn-prob'};
  const cls={todos:'a-todos',rota:'a-rota',aguardando:'a-ag',entregue:'a-ent',problema:'a-prob'};
  document.getElementById(map[f]).className='btn-f '+cls[f];
  ['card-rota','card-ag','card-ent','card-prob'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(f!=='todos'){const cmap={rota:'card-rota',aguardando:'card-ag',entregue:'card-ent',problema:'card-prob'};document.getElementById(cmap[f]).classList.add('active');}
  render();
}
document.getElementById('search').addEventListener('input',e=>{srch=e.target.value;render();});
render();
</script>
