
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farol de Entregas — Grupo MF Paris</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a202c;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hl{display:flex;align-items:center;gap:16px}
.logo{height:48px;width:auto}
.hdiv{width:1px;height:36px;background:#e2e8f0}
.htitle{font-size:15px;font-weight:600;color:#1a202c}
.hsub{font-size:11px;color:#718096;margin-top:2px}
.hr2{display:flex;gap:8px;align-items:center}
.hdate{font-size:12px;color:#718096;background:#f7fafc;border:1px solid #e2e8f0;padding:6px 14px;border-radius:20px}
.pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#f7fafc;color:#718096;cursor:pointer;transition:all .15s;user-select:none}
.pill:hover{border-color:#93c5fd;color:#2563eb}
.pill.ok{border-color:#a7f3d0;background:#ecfdf5;color:#059669}
.pill.erro{border-color:#fecaca;background:#fef2f2;color:#dc2626}
.pill.loading{border-color:#bfdbfe;background:#eff6ff;color:#2563eb}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 1.2s infinite}
.ptopo{position:fixed;top:0;left:0;width:100%;height:3px;z-index:9999;background:transparent}
.pbarra{height:100%;background:#3b82f6;border-radius:0 2px 2px 0;transition:width .4s;width:0}
main{max-width:1600px;margin:0 auto;padding:1.5rem}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:1.2rem 1.4rem;cursor:pointer;transition:all .18s}
.kpi:hover,.kpi.on{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kpi.k-rota.on{background:#eff6ff;border-color:#bfdbfe}
.kpi.k-ag.on{background:#fffbeb;border-color:#fde68a}
.kpi.k-ent.on{background:#ecfdf5;border-color:#a7f3d0}
.kpi.k-prob.on{background:#fef2f2;border-color:#fecaca}
.ki{font-size:22px;margin-bottom:8px;display:block}
.kn{font-size:32px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.k-rota .kn{color:#2563eb}.k-ag .kn{color:#d97706}.k-ent .kn{color:#059669}.k-prob .kn{color:#dc2626}
.kl{font-size:12px;color:#718096}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:220px}
.sw input{width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;color:#1a202c;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.sw input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.fb{padding:8px 14px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:500;color:#718096;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:#93c5fd;color:#2563eb;background:#eff6ff}
.fb.on,.fb.f-rota.on{background:#eff6ff;border-color:#bfdbfe;color:#2563eb;font-weight:600}
.fb.f-ag.on{background:#fffbeb;border-color:#fde68a;color:#d97706;font-weight:600}
.fb.f-ent.on{background:#ecfdf5;border-color:#a7f3d0;color:#059669;font-weight:600}
.fb.f-prob.on{background:#fef2f2;border-color:#fecaca;color:#dc2626;font-weight:600}
.cbar{font-size:12px;color:#a0aec0;margin-bottom:.6rem;display:flex;justify-content:space-between}
.ultima{font-size:11px;color:#94a3b8}
.tw{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;overflow-x:auto;box-shadow:0 1px 6px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px}
thead tr{background:#f8fafc;border-bottom:2px solid #e2e8f0}
th{padding:11px 14px;text-align:left;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#64748b;background:#f1f5f9}
th.sa::after{content:' ↑';color:#3b82f6}
th.sd::after{content:' ↓';color:#3b82f6}
th.sa,th.sd{color:#3b82f6}
td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-rota{background:#dbeafe;color:#1d4ed8}
.b-ag{background:#fef3c7;color:#92400e}
.b-ent{background:#d1fae5;color:#065f46}
.b-prob{background:#fee2e2;color:#991b1b}
.ccell{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#374151;font-weight:500}
.dim{color:#cbd5e0}
.licit{font-size:11px;background:#f0f4ff;color:#4f46e5;padding:3px 8px;border-radius:6px;font-weight:500}
.com{font-size:11px;background:#f0fdf4;color:#166534;padding:3px 8px;border-radius:6px;font-weight:500}
.tag-rota{font-size:10px;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
.prod-cell{font-size:11px;color:#f59e0b;font-weight:500;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vazia{text-align:center;padding:60px 20px;color:#94a3b8}
.vazia-ico{font-size:40px;margin-bottom:12px}
.vazia-txt{font-size:14px;font-weight:500;margin-bottom:6px;color:#64748b}
.vazia-sub{font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
</style>
</head>

<script>
// Limpar localStorage antigo para garantir versão nova
localStorage.removeItem('farol_pedidos');
localStorage.removeItem('farol_sheet_url');

var URL_API = 'https://script.google.com/macros/s/AKfycbyutl3JUVzjH78b1RQj9jD22L7-T8CX9kQN0df8SjK7d-q_PKPiRAprLMPZK0vCt4Pxqw/exec';
var PEDIDOS = [];
var filtro = '';
var sortCol = 'EMBARQUE';
var sortDir = 1;

document.getElementById('hdate').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

function prog(p){ document.getElementById('prog').style.width = p+'%'; }

function setPill(estado, txt){
  var el = document.getElementById('pill');
  var dt = document.getElementById('dot');
  el.className = 'pill ' + estado;
  dt.className = 'dot' + (estado==='loading'?' pulse':'');
  document.getElementById('pill-txt').textContent = txt;
}

function sincronizar(){
  setPill('loading','Atualizando...');
  prog(15);
  fetch(URL_API)
    .then(function(r){ prog(60); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      prog(100);
      if(d.erro) throw new Error(d.erro);
      PEDIDOS = d.pedidos || [];
      var h = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('ultima').textContent = 'Atualizado às '+h+' · próxima em 5 min';
      setPill('ok','Sincronizado ✓');
      render();
      setTimeout(function(){ prog(0); }, 700);
    })
    .catch(function(e){
      prog(0);
      setPill('erro','Erro — clique para tentar');
      document.getElementById('ultima').textContent = 'Falha na última sincronização';
      console.error(e);
    });
}

function statusNorm(s){
  if(!s) return 'Aguardando embarque';
  var t = s.trim().toLowerCase();
  if(t.includes('rota'))       return 'Em rota';
  if(t.includes('entregue'))   return 'Entregue';
  if(t.includes('problema'))   return 'Problema';
  if(t.includes('aguardando')||t.includes('embarque')) return 'Aguardando embarque';
  return s.trim();
}

function statusCls(s){
  if(s==='Em rota')   return 'b-rota';
  if(s==='Entregue')  return 'b-ent';
  if(s==='Problema')  return 'b-prob';
  return 'b-ag';
}

function fmt(v){
  v = parseFloat(v);
  return (isNaN(v)||v<=0) ? '—' : v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function parseDt(s){
  if(!s) return 0;
  var p=s.split('/');
  if(p.length===3) return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])).getTime();
  return new Date(s).getTime()||0;
}

function sortData(arr){
  return arr.slice().sort(function(a,b){
    var va,vb;
    if(sortCol==='EMBARQUE'||sortCol==='PREV_ENTREGA'){ va=parseDt(a[sortCol]);vb=parseDt(b[sortCol]); }
    else if(sortCol==='PESO'||sortCol==='FRETE_RATEIO'){ va=parseFloat(a[sortCol])||0;vb=parseFloat(b[sortCol])||0; }
    else if(sortCol==='PEDIDO'){ va=parseInt(a[sortCol])||0;vb=parseInt(b[sortCol])||0; }
    else{ va=(a[sortCol]||'').toLowerCase();vb=(b[sortCol]||'').toLowerCase(); }
    return va<vb?-1*sortDir:va>vb?1*sortDir:0;
  });
}

function setFilt(f){
  filtro=f;
  ['btn-todos','btn-rota','btn-ag','btn-ent','btn-prob'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
  ['k-rota','k-ag','k-ent','k-prob'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
  if(!f)                            document.getElementById('btn-todos').classList.add('on');
  else if(f==='Em rota')           { document.getElementById('btn-rota').classList.add('on'); document.getElementById('k-rota').classList.add('on'); }
  else if(f==='Aguardando embarque'){ document.getElementById('btn-ag').classList.add('on');   document.getElementById('k-ag').classList.add('on'); }
  else if(f==='Entregue')          { document.getElementById('btn-ent').classList.add('on');   document.getElementById('k-ent').classList.add('on'); }
  else if(f==='Problema')          { document.getElementById('btn-prob').classList.add('on');  document.getElementById('k-prob').classList.add('on'); }
  render();
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  document.querySelectorAll('th').forEach(function(t){ t.classList.remove('sa','sd'); });
  var th=document.getElementById('th-'+col);
  if(th) th.classList.add(sortDir===1?'sa':'sd');
  render();
}

function render(){
  var q=document.getElementById('bsc').value.toLowerCase();
  var rows=PEDIDOS.filter(function(p){
    var sn=statusNorm(p.STATUS);
    if(filtro&&sn!==filtro) return false;
    if(q&&![p.CLIENTE,p.CIDADE,p.ESTADO,p.PEDIDO,p.ROTA,p.PRODUTO,p.SKU].some(function(v){ return (v||'').toLowerCase().indexOf(q)>=0; })) return false;
    return true;
  });

  var cnt={rota:0,ag:0,ent:0,prob:0};
  PEDIDOS.forEach(function(p){
    var s=statusNorm(p.STATUS);
    if(s==='Em rota') cnt.rota++;
    else if(s==='Aguardando embarque') cnt.ag++;
    else if(s==='Entregue') cnt.ent++;
    else if(s==='Problema') cnt.prob++;
  });
  document.getElementById('n-rota').textContent=cnt.rota;
  document.getElementById('n-ag').textContent=cnt.ag;
  document.getElementById('n-ent').textContent=cnt.ent;
  document.getElementById('n-prob').textContent=cnt.prob;
  document.getElementById('cbar-txt').textContent=rows.length+' pedido(s) exibido(s) de '+PEDIDOS.length+' total';

  if(!rows.length){
    var msg=PEDIDOS.length===0
      ?'<div class="vazia"><div class="vazia-ico">📋</div><div class="vazia-txt">Aguardando dados da planilha</div><div class="vazia-sub">O Farol está conectado ao Google Sheets e sincroniza automaticamente</div></div>'
      :'<div class="vazia"><div class="vazia-ico">🔍</div><div class="vazia-txt">Nenhum resultado</div><div class="vazia-sub">Tente outros termos</div></div>';
    document.getElementById('tbody').innerHTML='<tr><td colspan="12">'+msg+'</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML=sortData(rows).map(function(p){
    var sn=statusNorm(p.STATUS);
    var sc=statusCls(sn);
    var lc=(p.LICITACAO||'').toLowerCase().includes('licit')?'licit':'com';
    var ll=lc==='licit'?'Licitação':'Comercial';
    return '<tr>'
      +'<td style="font-size:12px;color:#64748b;white-space:nowrap;">'+(p.EMBARQUE||'<span class="dim">—</span>')+'</td>'
      +'<td style="font-size:12px;color:#64748b;white-space:nowrap;">'+(p.PREV_ENTREGA||'<span class="dim">—</span>')+'</td>'
      +'<td style="font-size:12px;font-weight:600;color:#475569;">'+(p.PEDIDO||'<span class="dim">—</span>')+'</td>'
      +'<td class="ccell" title="'+(p.CLIENTE||'')+'">'+(p.CLIENTE||'')+'</td>'
      +'<td style="color:#4a5568;white-space:nowrap;">'+(p.CIDADE||'')+'</td>'
      +'<td style="font-size:11px;font-weight:700;color:#94a3b8;">'+(p.ESTADO||'')+'</td>'
      +'<td style="font-size:12px;color:#64748b;white-space:nowrap;">'+(p.PESO?p.PESO+' kg':'<span class="dim">—</span>')+'</td>'
      +'<td><span class="'+lc+'">'+ll+'</span></td>'
      +'<td class="prod-cell" title="'+(p.PRODUTO||'')+'">'+(p.PRODUTO||'<span class="dim">—</span>')+'</td>'
      +'<td style="font-size:12px;color:#64748b;white-space:nowrap;">'+fmt(p.FRETE_RATEIO)+'</td>'
      +'<td><span class="tag-rota">'+(p.ROTA||'—')+'</span></td>'
      +'<td><span class="badge '+sc+'">'+sn+'</span></td>'
      +'</tr>';
  }).join('');
}

// Iniciar e agendar sync a cada 5 minutos
sincronizar();
setInterval(sincronizar, 5*60*1000);
</script>
